<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💍 婚禮統計儀表板</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(160deg,#fdf8f4 0%,#f2dfd8 100%);color:#4a3f3a;padding:20px}
  .gate{background:#fff;border:1px solid #efe4dc;border-radius:20px;padding:36px 30px;
    box-shadow:0 12px 40px rgba(180,140,130,.18);width:100%;max-width:360px;text-align:center}
  .gate h1{font-size:1.5rem;margin-bottom:6px}
  .gate p{color:#9b8b83;font-size:.9rem;margin-bottom:22px}
  .gate input{width:100%;padding:13px 16px;border:1px solid #efe4dc;border-radius:12px;
    font-size:1.05rem;text-align:center;letter-spacing:3px;outline:none}
  .gate input:focus{border-color:#e8a0a8;box-shadow:0 0 0 3px #fdeef0}
  .gate button{width:100%;margin-top:14px;padding:13px;border:none;border-radius:12px;
    background:#c9727d;color:#fff;font-size:1rem;font-weight:700;cursor:pointer}
  .gate button:hover{background:#b5636e}
  .gate button:disabled{opacity:.6;cursor:wait}
  .err{color:#c0392b;font-size:.85rem;margin-top:12px;min-height:1.2em}
</style>
</head>
<body>
<div class="gate">
  <h1>💍 婚禮統計儀表板</h1>
  <p>此頁面受密碼保護，請輸入密碼</p>
  <form id="f">
    <input id="pw" type="password" inputmode="numeric" autocomplete="off" placeholder="請輸入密碼" autofocus>
    <button id="btn" type="submit">開啟</button>
    <div class="err" id="err"></div>
  </form>
</div>

async function unlock(pw){
  const enc=new TextEncoder();
  const base=await crypto.subtle.importKey("raw",enc.encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(SALT),iterations:ITER,hash:"SHA-256"},
    base,{name:"AES-GCM",length:256},false,["decrypt"]);
  const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(IV)},key,b64(CT));
  return new TextDecoder("utf-8").decode(plain);
}
document.getElementById("f").addEventListener("submit",async ev=>{
  ev.preventDefault();
  const btn=document.getElementById("btn"),err=document.getElementById("err");
  err.textContent="";btn.disabled=true;btn.textContent="解鎖中…";
  try{
    const html=await unlock(document.getElementById("pw").value);
    document.open();document.write(html);document.close();
  }catch(e){
    err.textContent="密碼錯誤，請再試一次";
    btn.disabled=false;btn.textContent="開啟";
    document.getElementById("pw").value="";document.getElementById("pw").focus();
  }
});
